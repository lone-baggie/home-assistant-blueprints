blueprint:
  author: "Lone baggie"
  homeassistant:
    min_version: 2024.6.0
  name: AVA Satellites Stuck Restart
  description: >
         ### 💬 Monitors multiple Assist Satellites and automatically restarts the specific one that gets stuck in a 'processing' state.
  domain: automation
  input:
    satellite_entities:
      name: Assist Satellites
      description: Choose one or more Assist Satellite entities to monitor.
      selector:
        entity:
          multiple: true
          filter:
            domain: assist_satellite
    stuck_duration:
      name: Stuck Duration
      description: How long should a satellite be stuck in 'processing' before a reboot?
      default:
        seconds: 60
      selector:
        duration:

trigger:
  - trigger: assist_satellite.processing
    target:
      entity_id: !input satellite_entities
    options:
      for: !input stuck_duration

condition: []

action:
  - variables:
      # trigger.entity_id returns the single entity that actually fired the trigger
      # (e.g., 'assist_satellite.portalmini_black')
      sat_name: "{{ trigger.entity_id.split('.')[1] }}"
      
      # Construct the corresponding restart button ID dynamically
      reset_button: "button.{{ sat_name }}_restart_service"
      
  - action: button.press
    target:
      entity_id: "{{ reset_button }}"

  - delay:
      seconds: 10
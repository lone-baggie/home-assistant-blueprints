blueprint:
  name: "AVA Read Weather forecast"
  author: "Lone baggie (Universal Tags with Dynamic {greeting})"
  homeassistant:
    min_version: 2024.6.0
  description: >
    ### 🌤 Weather Report & Direct Answers for AVA assistants
    
    Creates a natural sounding weather report and direct answers using a single master template string 
    with inline bracket tags `[m:...]`, `[a:...]`, `[e:...]`, and a dynamic `{greeting}` tag!
  domain: automation
  input:
    # --- Core Hardware Options Group ---
    core_hardware_options:
      name: Weather & media entities
      icon: mdi:devices
      collapsed: false
      input:
        weather_entity:
          name: Weather Provider
          description: Select the weather entity.
          selector:
            entity:
              filter:
                - domain: weather
        display:
          name: Display HTML page on device
          description: Toggle to display web page on device
          default: false
          selector:
            boolean: {}
        html:
          name: HTML display
          description: Enter URL of page to display on device. 
          default: http://192.168.0.254:8123/local/weather.html
          selector:
            text:

    # --- Collapsible Voice Phrases Section with Syntax Guide ---
    voice_command_options:
      name: Voice Phrases
      icon: mdi:account-voice
      collapsed: false
      description: >
        Custom voice sentences that will trigger this weather report or specific answers,
        utilizing standard Home Assistant bracket and pipe syntax.

        <br>

        <details>
          <summary><b>ℹ️ Click to view the Voice Command Syntax Guide</b></summary>
          <br>
          When editing the phrases below, use these rules to tweak your phrases:
          
          * <b>[Square Brackets]</b> = Optional words. Matches with or without them.
            * *Example:* `[what is] the weather` matches both "the weather" and "what is the weather".
            
          * <b>(Pipes | inside | parentheses)</b> = Alternative words (OR). Matches any single phrase.
            * *Example:* `(tell me|give me)` matches "tell me..." or "give me...".
        </details>
      input:
        weather_sentence_1:
          name: Weather Command 
          description: The primary phrase used to ask for the general weather.
          default: "what's the weather [today]"
          selector:
            text:
        weather_sentence_2:
          name: Secondary Weather Command 
          description: The secondary phrase to ask for a weather report.
          default: "(give me |tell me |read) [the] weather [forecast]"
          selector:
            text:
        rain_sentence_1:
          name: Rain Command
          description: Primary phrase to ask if it will rain today.
          default: "[will it|is it going to] rain [today]"
          selector:
            text:
        rain_sentence_2:
          name: Secondary Rain Command
          description: Alternative phrase to check rain or umbrella needs.
          default: "do i need an umbrella [today]"
          selector:
            text:
        temp_sentence_1:
          name: Temperature Command
          description: Primary phrase to ask what temperature it will be.
          default: "[what is |what will be |whats] [the] temperature [today]"
          selector:
            text:
        temp_sentence_2:
          name: Secondary Temperature Command
          description: Alternative phrase to ask about heat or cold.
          default: "how (hot|cold) is it going to be [today]"
          selector:
            text:

    # --- Collapsible Weather Wording Map ---
    weather_mapping_options:
      name: Weather forecast
      icon: mdi:weather-partly-rainy
      collapsed: true
      description: Swap weather codes for natural-sounding speech.
      input:
        custom_state_map:
          name: Weather Words List
          description: Change brief description to friendly words spoken by the smart assistant.
          selector:
            object: {}
          default:
            sunny: "beautifully sunny"
            partlycloudy: "partly cloudy with some bright spells"
            cloudy: "rather cloudy"
            clear-night: "clear and calm"
            fog: "quite foggy with low visibility"
            hail: "showering with hail"
            lightning: "thundery"
            lightning-rainy: "stormy with heavy rain and lightning"
            pouring: "absolutely pouring with heavy rain"
            rainy: "wet and rainy"
            snowy: "snowy underfoot"
            snowy-rainy: "a miserable mix of sleet and rain"
            windy: "blustery and windy"
            windy-variant: "windy and overcast"
            exceptional: "highly unusual and severe"

    # --- Collapsible Script Customization with Word Replacement Guide ---
    speech_profile_options:
      name: Weather Speech (Universal Bracket Tags)
      icon: mdi:chat
      collapsed: true
      description: >
        Configure your speech templates using inline bracket tags `[m:...]` (Morning), 
        `[a:...]` (Afternoon), and `[e:...]` (Evening) across all report types.

        <br>

        <details>
          <summary><b>ℹ️ Word Replacement & Tag Guide</b></summary>
          <br>
          * <b>{greeting}</b> = Dynamic time-based greeting (Good morning / afternoon / evening).
          * <b>[m:Text] [a:Text] [e:Text]</b> = Time-of-day specific phrasing block.
          * <b>{location}</b> = The name of your weather area.
          * <b>{current_temp}</b> = The current outdoor temperature right now.
          * <b>{condition}</b> = Your custom friendly wording for the current weather status.
          * <b>{high}</b> = Today's highest expected temperature.
          * <b>{low}</b> = Tonight's lowest expected temperature.
          * <b>{rain_chance}</b> = The percentage chance of rain.
        </details>
      input:
        weather_text_template:
          name: Full Weather Report Template
          description: Master template utilizing {greeting} and time-of-day brackets.
          default: >-
            {greeting}, [m:in {location}, it is currently {current_temp} degrees and looking {condition}. Expect a high of {high} and a low of {low}, with a {rain_chance} percent chance of rain.]
            [a:things are currently sitting at {current_temp} degrees with {condition}. We are heading for a high of {high}, dropping to {low} later tonight.]
            [e:it's currently {current_temp} degrees and {condition}. Overnight, we can expect a low of {low}, with a {rain_chance} percent chance of rain.]
          selector:
            text:
              multiline: true
        rain_text_template:
          name: Rain Answer Template
          description: Spoken text when asked if it will rain (chance > 20%).
          default: >-
            {greeting}, [m:yes, there is a {rain_chance} percent chance of rain on the cards today.]
            [a:yes, we are tracking a {rain_chance} percent chance of rain this afternoon.]
            [e:yes, expect a {rain_chance} percent chance of precipitation moving in tonight.]
          selector:
            text:
              multiline: true
        no_rain_text_template:
          name: No Rain Answer Template
          description: Spoken text when the rain chance is low or zero.
          default: >-
            {greeting}, [m:no rain expected this morning, keeping it dry with a mere {rain_chance} percent chance.]
            [a:it looks clear and dry for the afternoon, sitting at a {rain_chance} percent chance of rain.]
            [e:tonight is staying dry with just a {rain_chance} percent chance of rain.]
          selector:
            text:
              multiline: true
        temp_text_template:
          name: Temperature Answer Template
          description: Spoken text when asked about today's temperature.
          default: >-
            {greeting}, [m:it's sitting at {current_temp} degrees, climbing to a high of {high} later.]
            [a:it's {current_temp} degrees right now, peaking at a high of {high}.]
            [e:temperatures have settled to {current_temp} degrees, dropping to a low of {low} tonight.]
          selector:
            text:
              multiline: true

mode: single

trigger:
  - trigger: conversation
    command:
      - !input weather_sentence_1
      - !input weather_sentence_2
      - !input rain_sentence_1
      - !input rain_sentence_2
      - !input temp_sentence_1
      - !input temp_sentence_2

condition: []

action:
  - variables:
      weather: !input weather_entity
  - action: weather.get_forecasts
    target:
      entity_id: "{{weather}}"
    data:
      type: daily
    response_variable: met_office_output
  - variables:
      display: !input display
      url: !input html
      raw_weather_tpl: !input weather_text_template
      raw_rain_tpl: !input rain_text_template
      raw_no_rain_tpl: !input no_rain_text_template
      raw_temp_tpl: !input temp_text_template
      state_map: !input custom_state_map
      
      # Safely handle satellite splitting
      sat: "{{ trigger.satellite_id.split('.') if trigger.satellite_id is defined and trigger.satellite_id is not none and '.' in trigger.satellite_id else ['', ''] }}"

      switch: >
        {% if sat | length > 1 and sat[1] != "" %}
          switch.{{ sat[1] }}_browser_display
        {% else %}
          switch.dummy
        {% endif %}
        
      text: >
        {% if sat | length > 1 and sat[1] != "" %}
          text.{{ sat[1] }}_remote_browser_url
        {% else %}
          text.dummy
        {% endif %}
      
      # Determine current hour, bracket prefix to match, and dynamic greeting text
      current_hour: "{{ now().hour | int }}"
      active_prefix: >-
        {% set h = current_hour | int %}
        {% if h >= 5 and h < 12 %}[m:
        {% elif h >= 12 and h < 17 %}[a:
        {% else %}[e:
        {% endif %}

      dynamic_greeting: >-
        {% set h = current_hour | int %}
        {% if h >= 5 and h < 12 %}Good morning
        {% elif h >= 12 and h < 17 %}Good afternoon
        {% else %}Good evening
        {% endif %}

      # Clean bracket macro implementation for the main report
      clean_weather_template: >
        {% set raw = raw_weather_tpl %}
        {% set active = active_prefix %}
        {% set ns = namespace(result=raw) %}
        {% for p in ['[m:', '[a:', '[e:'] %}
          {% if p != active %}
            {% set s_idx = ns.result.find(p) %}
            {% if s_idx != -1 %}
              {% set e_idx = ns.result.find(']', s_idx) %}
              {% if e_idx != -1 %}
                {% set ns.result = ns.result[:s_idx] ~ ns.result[e_idx + 1:] %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% set s_idx = ns.result.find(active) %}
        {% if s_idx != -1 %}
          {% set e_idx = ns.result.find(']', s_idx) %}
          {% if e_idx != -1 %}
            {% set inner = ns.result[s_idx + 3 : e_idx] %}
            {% set ns.result = ns.result[:s_idx] ~ inner ~ ns.result[e_idx + 1:] %}
          {% endif %}
        {% endif %}
        {{ ns.result | trim }}

      # Clean bracket macro for rain templates
      clean_rain_template: >
        {% set raw = raw_rain_tpl %}
        {% set active = active_prefix %}
        {% set ns = namespace(result=raw) %}
        {% for p in ['[m:', '[a:', '[e:'] %}
          {% if p != active %}
            {% set s_idx = ns.result.find(p) %}
            {% if s_idx != -1 %}
              {% set e_idx = ns.result.find(']', s_idx) %}
              {% if e_idx != -1 %}
                {% set ns.result = ns.result[:s_idx] ~ ns.result[e_idx + 1:] %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% set s_idx = ns.result.find(active) %}
        {% if s_idx != -1 %}
          {% set e_idx = ns.result.find(']', s_idx) %}
          {% if e_idx != -1 %}
            {% set inner = ns.result[s_idx + 3 : e_idx] %}
            {% set ns.result = ns.result[:s_idx] ~ inner ~ ns.result[e_idx + 1:] %}
          {% endif %}
        {% endif %}
        {{ ns.result | trim }}

      # Clean bracket macro for no rain templates
      clean_no_rain_template: >
        {% set raw = raw_no_rain_tpl %}
        {% set active = active_prefix %}
        {% set ns = namespace(result=raw) %}
        {% for p in ['[m:', '[a:', '[e:'] %}
          {% if p != active %}
            {% set s_idx = ns.result.find(p) %}
            {% if s_idx != -1 %}
              {% set e_idx = ns.result.find(']', s_idx) %}
              {% if e_idx != -1 %}
                {% set ns.result = ns.result[:s_idx] ~ ns.result[e_idx + 1:] %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% set s_idx = ns.result.find(active) %}
        {% if s_idx != -1 %}
          {% set e_idx = ns.result.find(']', s_idx) %}
          {% if e_idx != -1 %}
            {% set inner = ns.result[s_idx + 3 : e_idx] %}
            {% set ns.result = ns.result[:s_idx] ~ inner ~ ns.result[e_idx + 1:] %}
          {% endif %}
        {% endif %}
        {{ ns.result | trim }}

      # Clean bracket macro for temperature templates
      clean_temp_template: >
        {% set raw = raw_temp_tpl %}
        {% set active = active_prefix %}
        {% set ns = namespace(result=raw) %}
        {% for p in ['[m:', '[a:', '[e:'] %}
          {% if p != active %}
            {% set s_idx = ns.result.find(p) %}
            {% if s_idx != -1 %}
              {% set e_idx = ns.result.find(']', s_idx) %}
              {% if e_idx != -1 %}
                {% set ns.result = ns.result[:s_idx] ~ ns.result[e_idx + 1:] %}
              {% endif %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {% set s_idx = ns.result.find(active) %}
        {% if s_idx != -1 %}
          {% set e_idx = ns.result.find(']', s_idx) %}
          {% if e_idx != -1 %}
            {% set inner = ns.result[s_idx + 3 : e_idx] %}
            {% set ns.result = ns.result[:s_idx] ~ inner ~ ns.result[e_idx + 1:] %}
          {% endif %}
        {% endif %}
        {{ ns.result | trim }}

      # Grab live core sensor values and daily forecast array data (rounded to nearest integer)
      current_temp_val: "{{ state_attr(weather, 'temperature') | default(states(weather), true) | float(0) | round(0) }}"
      today: "{{ met_office_output[weather].forecast[0] }}"
      location_name: "{{ state_attr(weather, 'friendly_name') }}"
      
      # Match the raw api state word against our user-customized dictionary map
      friendly_condition: >-
        {% set raw_cond = today.condition %}
        {{ state_map[raw_cond] if raw_cond in state_map else raw_cond | replace('-', ' ') }}
        
      # Extract precipitation probability safely (default to 0 if missing)
      rain_chance_val: "{{ today.precipitation_probability | default(0, true) | int }}"

      # Safely grab matched sentence text, defaulting to an empty string if None
      matched_sentence: "{{ trigger.sentence | default('', true) | lower }}"

      # Construct individual message variants using dynamic greeting, rounded temps, and bracket templates
      rain_message: >-
        {% set content = (clean_rain_template if rain_chance_val > 20 else clean_no_rain_template) %}
        {{ content 
          | replace('{greeting}', dynamic_greeting)
          | replace('{rain_chance}', rain_chance_val) }}

      temp_message: >-
        {{ clean_temp_template 
          | replace('{greeting}', dynamic_greeting)
          | replace('{location}', location_name)
          | replace('{current_temp}', current_temp_val)
          | replace('{high}', today.temperature | float(0) | round(0))
          | replace('{low}', today.templow | float(0) | round(0)) }}

      full_message: >-
        {{ clean_weather_template 
          | replace('{greeting}', dynamic_greeting)
          | replace('{location}', location_name)
          | replace('{current_temp}', current_temp_val)
          | replace('{condition}', friendly_condition)
          | replace('{high}', today.temperature | float(0) | round(0))
          | replace('{low}', today.templow | float(0) | round(0))
          | replace('{rain_chance}', rain_chance_val) }}

      # Final selector for what the assistant will actually say using keywords from our sentences
      weather_summary: >-
        {% if 'rain' in matched_sentence or 'umbrella' in matched_sentence %}
          {{ rain_message }}
        {% elif 'temperature' in matched_sentence or 'temp' in matched_sentence or 'hot' in matched_sentence or 'cold' in matched_sentence %}
          {{ temp_message }}
        {% else %}
          {{ full_message }}
        {% endif %}

  - if:
      - condition: template
        value_template: "{{ 'true' if display and sat[1] else 'false' }}"
    then:
      - action: text.set_value
        metadata: {}
        target:
          entity_id: "{{ text }}"
        data:
          value: "{{ url }}"
      - action: switch.turn_on
        metadata: {}
        target:
          entity_id: "{{ switch }}"
        data: {} 
  - set_conversation_response: "{{ weather_summary }}"
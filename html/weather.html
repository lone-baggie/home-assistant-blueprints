<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Weather Forecast</title>
    <style>
        /* --- Native Home Assistant Color Profiles --- */
        :root {
            --bg-color: #0f0f11;
            --card-color: #16161a;
            --text-color: #f1f5f9;
            --accent-color: #38bdf8;
            --border-color: #27272a;
            --sub-text: #a1a1aa;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            overflow-x: hidden;
            height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            height: 100%;
        }

        .weather-card {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .hero-left {
            display: flex;
            flex-direction: column;
        }

        .location-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .condition-state {
            font-size: 1.2rem;
            color: var(--sub-text);
            text-transform: capitalize;
        }

        .temp-display {
            font-size: 4.5rem;
            font-weight: 400;
            margin-top: 8px;
            line-height: 1;
        }

        .hero-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .weather-icon {
            font-size: 4rem;
            line-height: 1;
        }

        .extra-metrics {
            font-size: 1.1rem;
            color: var(--sub-text);
            text-align: right;
            line-height: 1.4;
        }

        .forecast-strip {
            background-color: var(--card-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            overflow-x: auto;
            gap: 8px;
        }

        .forecast-day {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            text-align: center;
            border-right: 1px solid var(--border-color);
            min-width: 70px;
        }

        .forecast-day:last-child {
            border-right: none;
        }

        .day-name {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-color);
        }

        .day-icon {
            font-size: 2rem;
        }

        .day-temp-high {
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* --- Secure Token Configuration Prompt Overlay --- */
        .token-gate {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(15, 15, 17, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
            z-index: 9999;
        }

        .gate-box {
            background: var(--card-color);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        .gate-box h2 { font-size: 1.8rem; margin-bottom: 12px; }
        .gate-box p { color: var(--sub-text); margin-bottom: 20px; font-size: 1rem; }
        
        .gate-box input {
            width: 100%;
            padding: 14px;
            background: #0f0f11;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: #fff;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        
        .gate-box button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        .gate-box button:active { background: #0369a1; }
    </style>
</head>
<body>

    <div id="setup-gate" class="token-gate">
        <div class="gate-box">
            <h2>🔒 Security Setup</h2>
            <p id="gate-msg">Reading system configurations...</p>
        </div>
    </div>

    <div class="container">
        <div class="weather-card">
            <div class="hero-left">
                <div class="location-title" id="display-location">Loading Location...</div>
                <div class="condition-state" id="current-condition">Loading...</div>
                <div class="temp-display" id="current-temp">--°C</div>
            </div>
            <div class="hero-right">
                <div class="weather-icon" id="current-icon">☁️</div>
                <div class="extra-metrics" id="current-metrics">
                    Humidity: --%<br>
                    Wind: -- km/h
                </div>
            </div>
        </div>

        <div class="forecast-strip" id="forecast-container"></div>
    </div>

    <script>
        const HA_URL = window.location.origin; 
        let CONFIG = null;
        let ACCESS_TOKEN = localStorage.getItem('ha_secure_token');

        const iconMap = {
            'clear-night': '🌙', 'cloudy': '☁️', 'fog': '🌫️', 'hail': '🌧️', 
            'lightning': '⛈️', 'lightning-rain': '⛈️', 'partlycloudy': '⛅', 
            'pouring': '🌧️', 'rainy': '🌦️', 'snowy': '❄️', 'snowy-rainy': '🌨️', 
            'sunny': '☀️', 'windy': '💨', 'windy-variant': '💨', 'exceptional': '☀️'
        };

        const currentTemp = document.getElementById('current-temp');
        const currentCondition = document.getElementById('current-condition');
        const currentIcon = document.getElementById('current-icon');
        const currentMetrics = document.getElementById('current-metrics');
        const forecastContainer = document.getElementById('forecast-container');
        const setupGate = document.getElementById('setup-gate');
        const gateMsg = document.getElementById('gate-msg');
        const displayLocation = document.getElementById('display-location');

        // Step 1: Read the configuration first to avoid hardcoding variables
        async function loadConfig() {
            try {
                const response = await fetch('weather_config.json');
                if (!response.ok) throw new Error();
                const data = await response.json();
                CONFIG = data.ui_configuration;
                
                // Set page title and header text directly from config mappings
                displayLocation.innerText = CONFIG.panel_title;
                
                if (ACCESS_TOKEN) { 
                    setupGate.style.display = 'none'; 
                    initWebSocket(); 
                } else { 
                    readTokenFile(); 
                }
            } catch (err) {
                setupGate.style.display = 'flex';
                gateMsg.innerHTML = '<span style="color:#ef4444">Error loading weather_config.json</span>';
            }
        }

        // Step 2: Fallback to token.txt mapping if localStorage is clean
        async function readTokenFile() {
            try {
                const response = await fetch('token.txt');
                if (!response.ok) throw new Error();
                const text = await response.text();
                ACCESS_TOKEN = text.trim();
                localStorage.setItem('ha_secure_token', ACCESS_TOKEN);
                setupGate.style.display = 'none';
                initWebSocket();
            } catch (err) {
                setupGate.style.display = 'flex';
                gateMsg.innerHTML = '<span style="color:#ef4444">Drop your long-lived token inside /www/token.txt</span>';
            }
        }

        // Step 3: Establish connection and handle real-time subscriptions
        function initWebSocket() {
            const wsUrl = HA_URL.replace(/^http/, 'ws') + '/api/websocket';
            const socket = new WebSocket(wsUrl);

            socket.onopen = () => {
                socket.send(JSON.stringify({ type: "auth", access_token: ACCESS_TOKEN }));
            };

            socket.onmessage = (event) => {
                const res = JSON.parse(event.data);

                if (res.type === "auth_invalid") {
                    localStorage.removeItem('ha_secure_token');
                    window.location.reload();
                }

                if (res.type === "auth_ok") {
                    // Fetch initial structural states
                    socket.send(JSON.stringify({ id: 2, type: "get_states" }));
                    // Use the modern server-push subscription architecture for weather updates
                    socket.send(JSON.stringify({ 
                        id: 3, 
                        type: "weather/subscribe_forecast", 
                        entity_id: CONFIG.weather_entity, 
                        forecast_type: "hourly" 
                    }));
                }

                // Parse initial baseline state payload
                if (res.id === 2 && res.type === "result") {
                    const stateObj = res.result.find(s => s.entity_id === CONFIG.weather_entity);
                    if (stateObj) updateCurrentWeather(stateObj);
                }

                // Handle incoming automatic broadcast events from our forecast subscription map
                if (res.type === "event" && res.id === 3) {
                    if (res.event && res.event.forecast) {
                        updateForecastUI(res.event.forecast);
                    }
                }
            };
        }

        function updateCurrentWeather(stateObj) {
            const attrs = stateObj.attributes || {};
            const stateStr = stateObj.state || '';

            currentTemp.textContent = `${attrs.temperature || '--'}°C`;
            currentCondition.textContent = stateStr.replace(/-/g, ' ');
            currentIcon.textContent = iconMap[stateStr.toLowerCase().replace(/[^a-z-]/g, '')] || '☀️';
            
            currentMetrics.innerHTML = `
                Humidity: ${attrs.humidity || '--'}%<br>
                Wind: ${attrs.wind_speed || '--'} km/h
            `;
        }

        function updateForecastUI(forecastArray) {
            forecastContainer.innerHTML = '';
            
            // Limit output preview to next 5 intervals to match your original grid capacity
            forecastArray.slice(0, 5).forEach(interval => {
                const dateObj = new Date(interval.datetime);
                const labelText = dateObj.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
                const iconSymbol = iconMap[interval.condition?.toLowerCase().replace(/[^a-z-]/g, '')] || '☀️';

                const dayDiv = document.createElement('div');
                dayDiv.className = 'forecast-day';
                dayDiv.innerHTML = `
                    <div class="day-name">${labelText}</div>
                    <div class="day-icon">${iconSymbol}</div>
                    <div class="day-temp-high">${interval.temperature || '--'}°</div>
                `;
                forecastContainer.appendChild(dayDiv);
            });
        }

        // Initialize script sequence
        loadConfig();
    </script>
</body>
</html>

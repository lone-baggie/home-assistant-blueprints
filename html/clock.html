<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiosk Flip Clock</title>
    <style>
        /* --- Linux Console Dark Mode Core Design Syntax --- */
        :root {
            --bg-color: #0f0f11;
            --card-color: #16161a;
            --text-color: #f1f5f9;
            --accent-color: #38bdf8;
            --border-color: #27272a;
            --sub-text: #a1a1aa;
            
            /* Physical Split-Flap Plastic Card Variables (Upscaled sizing) */
            --flip-bg: #1c1917;
            --flip-text: #f5f5f4;
            --flip-radius: 14px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        .container {
            width: 100%;
            max-width: 900px; /* Widened layout container to safely hold the seconds node */
            padding: 20px;
            text-align: center;
        }

        /* --- 3D Retro Mechanical Flip Clock Layout Panel --- */
        .flip-clock {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 45px;
            background-color: var(--card-color);
            border: 2px solid var(--border-color);
            border-radius: 28px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .flip-group {
            display: flex;
            gap: 10px;
        }

        /* Colons separating HH:MM:SS */
        .clock-separator {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            font-weight: 800;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
            height: 195px;
            line-height: 195px;
        }

        /* Individual Mechanical Flap Segment Frame (Increased by ~30%) */
        .flip-card {
            position: relative;
            width: 130px;
            height: 195px;
            font-size: 10.5rem;
            font-weight: 800;
            line-height: 195px;
            text-align: center;
            perspective: 600px; /* Keeps the 3D depth scaling crisp on a larger canvas */
        }

        /* Rigid plastic base cards */
        .card-panel {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background: var(--flip-bg);
            color: var(--flip-text);
            backface-visibility: hidden;
        }

        .card-top {
            top: 0;
            border-top-left-radius: var(--flip-radius);
            border-top-right-radius: var(--flip-radius);
            border-bottom: 2px solid rgba(0, 0, 0, 0.6);
        }

        .card-bottom {
            bottom: 0;
            border-bottom-left-radius: var(--flip-radius);
            border-bottom-right-radius: var(--flip-radius);
            line-height: 0; /* Shifts font baseline upward for the bottom plate mapping */
        }

        /* Dynamically injected running cards */
        .card-flip-panel {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50%;
            overflow: hidden;
            background: var(--flip-bg);
            color: var(--flip-text);
            transform-style: preserve-3d;
            animation-duration: 0.4s; /* Snappier rotation cycle for rapid seconds flipping */
            animation-timing-function: ease-in-out;
            animation-fill-mode: forwards;
        }

        .card-flip-top {
            top: 0;
            transform-origin: bottom center;
            border-top-left-radius: var(--flip-radius);
            border-top-right-radius: var(--flip-radius);
            border-bottom: 2px solid rgba(0, 0, 0, 0.6);
        }

        .card-flip-bottom {
            bottom: 0;
            transform-origin: top center;
            line-height: 0;
            border-bottom-left-radius: var(--flip-radius);
            border-bottom-right-radius: var(--flip-radius);
            transform: rotateX(180deg);
        }

        /* Mathematical Rotational Matrix Animation */
        @keyframes flipTop {
            0% { transform: rotateX(0deg); }
            100% { transform: rotateX(-90deg); }
        }

        @keyframes flipBottom {
            0% { transform: rotateX(90deg); }
            100% { transform: rotateX(0deg); }
        }

        .animate-top { animation-name: flipTop; }
        .animate-bottom { animation-name: flipBottom; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Mechanical Matrix Flip Grid Layout (HH:MM:SS) -->
        <div class="flip-clock">
            <!-- Hours -->
            <div class="flip-group" id="hours-group">
                <div class="flip-card" id="h1"><div class="card-panel card-top">0</div><div class="card-panel card-bottom">0</div></div>
                <div class="flip-card" id="h2"><div class="card-panel card-top">0</div><div class="card-panel card-bottom">0</div></div>
            </div>
            
            <div class="clock-separator">:</div>
            
            <!-- Minutes -->
            <div class="flip-group" id="minutes-group">
                <div class="flip-card" id="m1"><div class="card-panel card-top">0</div><div class="card-panel card-bottom">0</div></div>
                <div class="flip-card" id="m2"><div class="card-panel card-top">0</div><div class="card-panel card-bottom">0</div></div>
            </div>

            <div class="clock-separator">:</div>

            <!-- Seconds -->
            <div class="flip-group" id="seconds-group">
                <div class="flip-card" id="s1"><div class="card-panel card-top">0</div><div class="card-panel card-bottom">0</div></div>
                <div class="flip-card" id="s2"><div class="card-panel card-top">0</div><div class="card-panel card-bottom">0</div></div>
            </div>
        </div>
    </div>

    <script>
        // Internal state tracking object expanded to watch the seconds array
        const cardStates = { h1: '0', h2: '0', m1: '0', m2: '0', s1: '0', s2: '0' };

        function updateFlipCard(cardId, newValue) {
            // Guard clause: if the sub-second tick hasn't incremented the digit, drop execution
            if (cardStates[cardId] === newValue) return; 
            
            const card = document.getElementById(cardId);
            const oldValue = cardStates[cardId];
            cardStates[cardId] = newValue;

            // Inject the overlapping top and bottom animation card stacks
            card.innerHTML = `
                <div class="card-panel card-top">${newValue}</div>
                <div class="card-panel card-bottom">${oldValue}</div>
                <div class="card-flip-panel card-flip-top animate-top">${oldValue}</div>
                <div class="card-flip-panel card-flip-bottom animate-bottom">${newValue}</div>
            `;

            // Garbage collection loop: snap structure clean before the next second ticks over
            setTimeout(() => {
                card.innerHTML = `
                    <div class="card-panel card-top">${newValue}</div>
                    <div class="card-panel card-bottom">${newValue}</div>
                `;
            }, 350); // Cut down from 400ms to clear runtime paths faster for high-speed seconds tracking
        }

        function runClockEngine() {
            const now = new Date();
            const hrs = String(now.getHours()).padStart(2, '0');
            const mins = String(now.getMinutes()).padStart(2, '0');
            const secs = String(now.getSeconds()).padStart(2, '0');

            updateFlipCard('h1', hrs[0]);
            updateFlipCard('h2', hrs[1]);
            updateFlipCard('m1', mins[0]);
            updateFlipCard('m2', mins[1]);
            updateFlipCard('s1', secs[0]);
            updateFlipCard('s2', secs[1]);
        }

        // Run the engine at 200ms intervals (5hz) to prevent clock desync drift 
        setInterval(runClockEngine, 200);
        runClockEngine(); // Initial execution loop
    </script>
</body>
</html>
